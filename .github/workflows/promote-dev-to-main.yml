name: Promote dev to main

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  open-promotion-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Find or open dev -> main PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          repo="${{ github.repository }}"
          existing=$(gh pr list --repo "$repo" --base main --head dev --state open --json number --jq '.[0].number')

          if [ -n "$existing" ]; then
            echo "Promotion PR already open: #$existing"
            exit 0
          fi

          ahead=$(gh api "repos/$repo/compare/main...dev" --jq '.ahead_by')
          if [ "$ahead" -eq 0 ]; then
            echo "main is already up to date with dev; nothing to promote"
            exit 0
          fi

          echo "Opening promotion PR for $ahead commit(s)"
          gh pr create --repo "$repo" \
            --base main --head dev \
            --title "Promote dev to main" \
            --body "Automated PR proposing to promote the current state of \`dev\` to \`main\`.

Merging this triggers a new release tag and container build — review and merge manually when ready."
